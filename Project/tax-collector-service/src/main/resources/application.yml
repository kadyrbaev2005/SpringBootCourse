server:
  port: 8080

spring:
  application:
    name: tax-collector-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taxdb}
    username: ${DB_USER:taxuser}
    password: ${DB_PASSWORD:taxpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  web:
    resources:
      add-mappings: false
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 3000

oracle:
  service:
    url: ${ORACLE_SERVICE_URL:http://localhost:8081}

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
    instances:
      oracle-service:
        baseConfig: default

app:
  jwt:
    secret: ${JWT_SECRET:medieval-tax-collector-dev-secret-key-change-in-production-min-256-bits-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.medieval.taxcollector: INFO

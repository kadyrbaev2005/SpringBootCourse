spring:
  datasource:
    url: jdbc:h2:mem:taxdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

oracle:
  service:
    url: http://localhost:8081

logging:
  level:
    org.springframework.security: WARN

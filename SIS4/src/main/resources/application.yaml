spring:
  application:
    name: SIS4
    
  datasource:
    url: jdbc:postgresql://localhost:5433/eventdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    
  jpa:
    database: POSTGRESQL
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.eventmanagement.eventapi: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"